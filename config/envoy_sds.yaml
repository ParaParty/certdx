# Envoy configuration example for certdx SDS.
#
# Prerequisites:
#   1. A running certdx_server with gRPC SDS enabled.
#   2. An mTLS client bundle generated with:
#        certdx_tools make-client --name envoy-frontend
#   3. Split the three PEM blocks from mtls/envoy-frontend.pem into the
#      inline_string fields below:
#        - First CERTIFICATE block  → certificate_chain
#        - EC PRIVATE KEY block     → private_key
#        - Second CERTIFICATE block → trusted_ca (the CA cert)
#
# This config:
#   - Declares a certdx SDS cluster with mTLS.
#   - Requests two SDS secrets: "wildcard_example" and "api_example".
#   - Serves HTTPS on port 8443 using the wildcard cert from SDS.
#   - Routes all traffic to a local upstream on port 8080.

node:
  id: envoy-frontend
  cluster: envoy-frontend
  metadata:
    # Each key becomes an SDS secret name. The certdx server issues a
    # certificate covering the listed SANs. These domains must be allowed
    # by the server's ACME.allowedDomains.
    domains:
      wildcard_example: ["*.example.com", "example.com"]
      api_example:      ["api.example.com"]

static_resources:
  clusters:
  # ----- CertDX SDS cluster (mTLS) -----
  - name: certdx_sds
    type: LOGICAL_DNS
    connect_timeout: 1s
    typed_extension_protocol_options:
      envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
        "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
        explicit_http_config:
          http2_protocol_options:
            initial_stream_window_size:     65536    # 64 KiB
            initial_connection_window_size: 1048576  # 1 MiB
            allow_connect: false
            connection_keepalive:
              interval: 30s
              timeout:  20s
    load_assignment:
      cluster_name: certdx_sds
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: sds.example.com
                port_value: 10002
    transport_socket:
      name: envoy.transport_sockets.tls
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
        common_tls_context:
          tls_params:
            tls_minimum_protocol_version: TLSv1_3
            tls_maximum_protocol_version: TLSv1_3
          # Inline the three PEM blocks from the envoy-frontend.pem bundle.
          tls_certificates:
          - certificate_chain:
              inline_string: |
                -----BEGIN CERTIFICATE-----
                <first CERTIFICATE block from envoy-frontend.pem>
                -----END CERTIFICATE-----
            private_key:
              inline_string: |
                -----BEGIN EC PRIVATE KEY-----
                <EC PRIVATE KEY block from envoy-frontend.pem>
                -----END EC PRIVATE KEY-----
          validation_context:
            trusted_ca:
              inline_string: |
                -----BEGIN CERTIFICATE-----
                <second CERTIFICATE block from envoy-frontend.pem (the CA)>
                -----END CERTIFICATE-----

  # ----- Upstream application cluster -----
  - name: upstream
    type: STRICT_DNS
    connect_timeout: 1s
    load_assignment:
      cluster_name: upstream
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: 127.0.0.1
                port_value: 8080

  listeners:
  - name: https
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 8443
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: ingress_https
          route_config:
            virtual_hosts:
            - name: default
              domains: ["*"]
              routes:
              - match:
                  prefix: "/"
                route:
                  cluster: upstream
          http_filters:
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
          common_tls_context:
            # The SDS secret name must match a key under node.metadata.domains.
            tls_certificate_sds_secret_configs:
            - name: wildcard_example
              sds_config:
                initial_fetch_timeout: 120s
                resource_api_version: V3
                api_config_source:
                  api_type: GRPC
                  transport_api_version: V3
                  grpc_services:
                  - envoy_grpc:
                      cluster_name: certdx_sds
