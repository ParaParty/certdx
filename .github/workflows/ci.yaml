name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  unit:
    name: unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.0
          cache: true

      - name: Test root module
        run: go test -race -count=1 ./...

      - name: Test exec/server
        working-directory: exec/server
        run: go test -race -count=1 ./...

      - name: Test exec/client
        working-directory: exec/client
        run: go test -race -count=1 ./...

      - name: Test exec/tools
        working-directory: exec/tools
        run: go test -race -count=1 ./...

      - name: Test exec/caddytls
        working-directory: exec/caddytls
        run: go test -race -count=1 ./...

  e2e:
    name: end-to-end tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.0
          cache: true

      - name: Run e2e tests
        working-directory: test/e2e
        run: go test -race -tags=e2e -count=1 -timeout=10m -v ./...

      - name: Upload e2e logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: |
            /tmp/Test*/**/logs/*.log
            /tmp/Test*/**/*.toml
          if-no-files-found: warn
          retention-days: 7
